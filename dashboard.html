<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Dashboard | Handy</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <body class="bg-light">
    
    <div id="header-placeholder"></div> <!-- Placeholder for header -->

    <!-- Load header with JavaScript -->
    <script>
        fetch('../../header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            })
            .catch(error => console.error('Error loading header:', error));
    </script>

  <main class="page-wrap">
    <h1>Your Web Dashboard</h1>

    <p style="margin-top:10px; color:#333; max-width: 720px;">
      This dashboard is read-only. To post a job, manage bookings, chat, or make payments,
      please continue in the Handy app.
    </p>

    <div style="margin-top:18px;">
      <a class="primary-cta" href="https://app.handy.com/post_job.php">
        Continue in App
      </a>
    </div>

    <div style="margin-top:18px; padding:14px; background:#f7f7f7; border-radius:8px; max-width: 720px;">
      <h3 style="margin-bottom:8px;">What you can do here</h3>
      <ul style="padding-left:18px;">
        <li>Read platform information</li>
        <li>Access support/FAQ</li>
        <li>Continue into the app for full functionality</li>
      </ul>
    </div>
  </main>

</body>
</html>
